---

- name: desktop | Configure desktop
  become: true
  become_user: "{{ user_username }}"
  block:
    - name: desktop | Enable only close window button
      community.general.dconf:
        key: /org/gnome/desktop/wm/preferences/button-layout
        state: present
        value: "':close'"

    - name: desktop | Prefer light mode
      community.general.dconf:
        key: /org/gnome/desktop/interface/color-scheme"
        state: present
        value: "'prefer-light'"

    - name: desktop | Remove app grid folders
      community.general.dconf:
        key: /org/gnome/desktop/app-folders/folder-children
        state: absent

    - name: desktop | Set center window shortcut
      community.general.dconf:
        key: /org/gnome/desktop/wm/keybindings/move-to-center
        state: present
        value: "['<Super><Shift>c']"

    - name: desktop | Center new windows
      community.general.dconf:
        key: /org/gnome/mutter/center-new-windows
        state: present
        value: "true"

    - name: desktop | Always show A11y Menu
      community.general.dconf:
        key: /org/gnome/desktop/a11y/always-show-universal-access-status
        state: present
        value: "true"

    - name: desktop | Enable Hot Corners
      when: not is_virtual
      community.general.dconf:
        key: /org/gnome/desktop/interface/enable-hot-corners
        state: present
        value: "true"

    - name: desktop | Disable Hot Corners
      when: is_virtual
      community.general.dconf:
        key: /org/gnome/desktop/interface/enable-hot-corners
        state: present
        value: "false"

    - name: desktop | Stop update notifications
      when: is_ubuntu and is_virtual
      community.general.dconf:
        key: /com/ubuntu/update-notifier/no-show-notifications
        state: present
        value: "true"
