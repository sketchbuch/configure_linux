---

- name: mscorefonts | Install font
  when: is_fedora
  ansible.builtin.package:
    name: "{{ font_mscore }}"
    state: present
  tags: ["system", "fonts"]


- name: mscorefonts | Install font
  when: is_ubuntu
  block:
    - name: mscorefonts | Accept eula
      ansible.builtin.debconf:
        name: "{{ font_mscore }}"
        question: "msttcorefonts/accepted-mscorefonts-eula"
        value: "true"
        vtype: "select"

    - name: mscorefonts | Install fonts
      ansible.builtin.package:
        name: "{{ font_mscore }}"
        state: present
