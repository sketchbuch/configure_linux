- name: install font - ms core
  block:
    - name: ms core - check if installed
      ansible.builtin.stat:
        path: "/usr/share/fonts/msttcore/arial.ttf"
      register: fedoraMsCoreFontsInstalled

    - name: ms core - already installed
      ansible.builtin.debug:
        msg: "Skipping font"
      when: fedoraMsCoreFontsInstalled.stat.exists

    - name: ms core - install needed packages
      ansible.builtin.dnf:
        name:
          - cabextract
          - xorg-x11-font-utils
          - fontconfig
        state: present
      when: not fedoraMsCoreFontsInstalled.stat.exists

    - name: ms core - install fonts
      ansible.builtin.shell:
        cmd: "sudo rpm -i https://downloads.sourceforge.net/project/mscorefonts2/rpms/msttcore-fonts-installer-2.6-1.noarch.rpm"
      when: not fedoraMsCoreFontsInstalled.stat.exists
  when: isFedora

- name: install font - ms core
  block:
    - name: ms core - accept eula
      ansible.builtin.debconf:
        name: "ttf-mscorefonts-installer"
        question: "msttcorefonts/accepted-mscorefonts-eula"
        value: "true"
        vtype: "select"

    - name: ms core - install fonts
      ansible.builtin.package:
        name: "ttf-mscorefonts-installer"
        state: present
  when: isUbuntu
