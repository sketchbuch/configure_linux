---

- name: flathub | Add/remove flatpaks from flathub
  become: true
  become_user: "{{ user_username }}"
  block:
  - name: flathub | Install audio
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.audio }}"
      group_name: audio
      remote: flathub
  
  - name: flathub | Install browsers
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.browsers }}"
      group_name: browsers
      remote: flathub
  
  - name: flathub | Install development
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.development }}"
      group_name: development
      remote: flathub
  
  - name: flathub | Install games
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.games }}"
      group_name: games
      remote: flathub
  
  - name: flathub | Install gnome
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.gnome }}"
      group_name: gnome
      remote: flathub
  
  - name: flathub | Install gnome circle
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.gnome_circle }}"
      group_name: gnome circle
      remote: flathub
  
  - name: flathub | Install imagery
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.imagery }}"
      group_name: imagery
      remote: flathub
  
  - name: flathub | Install productivity
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.productivity }}"
      group_name: productivity
      remote: flathub
  
  - name: flathub | Install utils
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.utils }}"
      group_name: utils
      remote: flathub
  
  - name: flathub | Install videos
    ansible.builtin.import_tasks: ../flatpak/add.yaml
    vars:
      apps: "{{ flathub.add.videos }}"
      group_name: videos
      remote: flathub
