---

- name: flathub | Install flatpak apps
  become: true
  become_user: "{{ user_username }}"
  block:
  - name: flathub | Install audio
    community.general.flatpak:
      method: user
      name: "{{ app_name }}"
      state: present
    loop: "{{ flathub.add.audio }}"
    loop_control:
      loop_var: app_name

  - name: flathub | Install browsers
    community.general.flatpak:
      name: "{{ app_name }}"
      state: present
      method: user
    loop: "{{ flathub.add.browsers }}"
    loop_control:
      loop_var: app_name

  - name: flathub | Install development
