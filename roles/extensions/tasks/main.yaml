---

- name: Include task vars
  ansible.builtin.include_vars:
    file: "task.yaml"

- name: Create tmp folder
  become: true
  become_user: "{{ user_username }}"
  ansible.builtin.file:
    group: "{{ user_username }}"
    mode: "0754"
    path: "/tmp/anisible_tmp_{{ user_username }}"
    state: directory

- name: Set tmp folder fact
  ansible.builtin.set_fact:
    tmp_dir: "/tmp/anisible_tmp_{{ user_username }}"

- name: Add/remove gnome extensions
  become: true
  become_user: "{{ user_username }}"
  block:
    - name: Install gnome extensions
      loop: "{{ gnome.add.user }}"
      loop_control:
        loop_var: ext
      ansible.builtin.include_tasks: ./gnome/extensions_install.yaml

    - name: Set dconf disabled extensions
      community.general.dconf:
        key: /org/gnome/shell/disabled-extensions
        state: present
        value: "[{{ gnome.dconf.disabled }}]"

    - name: Set dconf enabled extensions
      community.general.dconf:
        key: /org/gnome/shell/enabled-extensions
        state: present
        value: "[{{ gnome.dconf.enabled }}]"
