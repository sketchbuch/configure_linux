# https://www.itzgeek.com/how-tos/linux/ubuntu-how-tos/how-to-install-google-chrome-on-ubuntu-22-04.html
# https://www.ansiblepilot.com/articles/install-google-chrome-in-debian-like-systems-ansible-module-apt_key-apt_repository-and-apt/

- name: chrome | Install chrome (ubuntu)
  when: is_ubuntu
  become: true
  become_user: "{{ user_username }}"
  block:
    - name: chrome | Add Google signing key
      ansible.builtin.apt_key:
        state: present
        url: "https://dl.google.com/linux/linux_signing_key.pub"

    - name: chrome | Add repo
      ansible.builtin.apt_repository:
        filename: google-chrome
        repo: deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main
        state: present

    - name: chrome | Install software
      ansible.builtin.apt:
        name: "google-chrome-stable"
        state: present
        update_cache: true

# https://docs.fedoraproject.org/en-US/quick-docs/installing-chromium-or-google-chrome-browsers/

- name: chrome | Install chrome (fedora)
  when: is_fedora
  block:
    - name: chrome | Add workstation repos
      become: true
      ansible.builtin.dnf:
        name: fedora-workstation-repositories
        state: present

    - name: chrome | Enable chrome in DNF config manager
      ansible.builtin.command:
        cmd: dnf config-manager --set-enabled google-chrome

    - name: chrome | Install software
      become: true
      become_user: "{{ user_username }}"
      ansible.builtin.dnf:
        name: google-chrome-stable
        state: present
