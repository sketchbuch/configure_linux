---

- name: flathub | Install audio software
  become: true
  become_user: "{{ user_username }}"
  community.general.flatpak:
    method: user
    name: "{{ app_name }}"
    state: present
  loop: "{{ flathub.audio }}"
  loop_control:
    loop_var: app_name

- name: flathub | Install browsers
  become: true
  become_user: "{{ user_username }}"
  community.general.flatpak:
    name: "{{ app_name }}"
    state: present
    method: user
  loop: "{{ flathub.browsers }}"
  loop_control:
    loop_var: app_name

- name: flathub | Install development tools
  become: true
  become_user: "{{ user_username }}"
