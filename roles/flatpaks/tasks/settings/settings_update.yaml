---

- name: settings_update | Create folder for {{ app | basename }}
  ansible.builtin.file:
    path: "/home/{{ user_username }}/.var/app/{{ app | basename }}/config/glib-2.0/settings"
    state: directory
    mode: '0700'

- name: settings_update | Updating settings for {{ app | basename }}
  become: true
  become_user: "{{ user_username }}"
  ansible.builtin.copy:
    dest: "/home/{{ user_username }}/.var/app/{{ app | basename }}/config/glib-2.0/settings/keyfile"
    group: "{{ user_username }}"
    mode: preserve
    owner: "{{ user_username }}"
    src: "{{ app | basename }}"
