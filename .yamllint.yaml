---
extends: default

rules:
  colons:
    max-spaces-after: 1
    max-spaces-before: 0

  comments:
    ignore-shebangs: true
    min-spaces-from-content: 2
    require-starting-space: true

  empty-lines:
    max-end: 0
    max-start: 0
    max: 2

  hyphens:
    max-spaces-after: 1

  indentation:
    check-multi-line-strings: false
    indent-sequences: true
    spaces: 2

  line-length:
    allow-non-breakable-inline-mappings: true
    allow-non-breakable-words: true
    level: warning
    max: 160

  new-lines:
    type: unix

  truthy:
    allowed-values: ["true", "false"]
    check-keys: false

ignore: |
  .cache/
  .git/
  collections/
  node_modules/
  old/
  roles/external/
  venv/
